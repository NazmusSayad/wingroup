name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Install make
        run: choco install make -y

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) {
            $version = $tag.Substring(1)
          } else {
            $version = $tag
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build release artifacts
        run: make portable installer VERSION=${{ steps.version.outputs.version }} INFO_VERSION=${{ github.ref_name }}

      - name: Test release artifacts
        shell: pwsh
        run: |
          $portable = Get-Item "dist/WinGroup.exe"
          $setup = Get-Item "dist/WinGroup-Setup.exe"
          $portableMb = [Math]::Round($portable.Length / 1MB, 2)
          $setupMb = [Math]::Round($setup.Length / 1MB, 2)
          "Portable size: $portableMb MB"
          "Setup size: $setupMb MB"
          "### Release Artifact Sizes" >> $env:GITHUB_STEP_SUMMARY
          "- WinGroup.exe: $portableMb MB" >> $env:GITHUB_STEP_SUMMARY
          "- WinGroup-Setup.exe: $setupMb MB" >> $env:GITHUB_STEP_SUMMARY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: WinGroup ${{ github.ref_name }}
          files: |
            dist/WinGroup.exe
            dist/WinGroup-Setup.exe
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
